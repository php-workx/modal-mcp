apiVersion: v1
kind: Service
metadata:
  name: {{ include "modal-mcp.fullname" . }}
  labels:
    app.kubernetes.io/name: modal-mcp
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/name: modal-mcp
    app.kubernetes.io/instance: {{ .Release.Name }}
