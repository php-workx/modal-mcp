apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "modal-mcp.fullname" . }}
  labels:
    app.kubernetes.io/name: modal-mcp
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: modal-mcp
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: modal-mcp
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: modal-mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            {{- range $name, $value := .Values.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            - name: MODAL_TOKEN_ID_FILE
              value: /run/secrets/modal-token-id
            - name: MODAL_TOKEN_SECRET_FILE
              value: /run/secrets/modal-token-secret
            - name: MODAL_MCP_SIGNING_KEY_FILE
              value: /run/secrets/modal-mcp-signing-key
          volumeMounts:
            - name: modal-mcp-secrets
              mountPath: /run/secrets
              readOnly: true
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: modal-mcp-secrets
          projected:
            sources:
              - secret:
                  name: {{ .Values.secretRefs.modalTokenId.name }}
                  items:
                    - key: {{ .Values.secretRefs.modalTokenId.key }}
                      path: modal-token-id
              - secret:
                  name: {{ .Values.secretRefs.modalTokenSecret.name }}
                  items:
                    - key: {{ .Values.secretRefs.modalTokenSecret.key }}
                      path: modal-token-secret
              - secret:
                  name: {{ .Values.secretRefs.signingKey.name }}
                  items:
                    - key: {{ .Values.secretRefs.signingKey.key }}
                      path: modal-mcp-signing-key
