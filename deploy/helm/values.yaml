replicaCount: 1

image:
  repository: ghcr.io/example/modal-mcp
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8765

ingress:
  enabled: false
  className: ""
  hosts:
    - host: modal-mcp.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  MODAL_MCP_HTTP_BIND: "0.0.0.0:8765"
  MODAL_MCP_ALLOWED_ORIGINS: "http://127.0.0.1:8765"
  MODAL_MCP_ALLOWED_HOSTS: "127.0.0.1,localhost"
  MODAL_MCP_READ_ONLY: "true"
  MODAL_MCP_ENABLED_TOOLSETS: "discovery,apps,containers,logs,volumes,sandboxes"
  MODAL_MCP_AUDIT_LOG: "stdout"
  MODAL_MCP_CLI_FALLBACK: "false"
  MODAL_MCP_DEBUG: "false"
  MODAL_MCP_DEBUG_EXPOSE_IDS: "false"

secretRefs:
  modalTokenId:
    name: modal-mcp-secrets
    key: modal-token-id
  modalTokenSecret:
    name: modal-mcp-secrets
    key: modal-token-secret
  signingKey:
    name: modal-mcp-secrets
    key: modal-mcp-signing-key

resources: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
