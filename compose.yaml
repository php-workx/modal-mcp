services:
  modal-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: modal-mcp:local
    init: true
    ports:
      - "127.0.0.1:8765:8765"
    environment:
      MODAL_MCP_HTTP_BIND: "0.0.0.0:8765"
      MODAL_MCP_ALLOWED_ORIGINS: "http://127.0.0.1:8765"
      MODAL_MCP_ALLOWED_HOSTS: "127.0.0.1,localhost"
      MODAL_MCP_READ_ONLY: "true"
      MODAL_MCP_ENABLED_TOOLSETS: "discovery,apps,containers,logs,volumes,sandboxes"
      MODAL_MCP_SIGNING_KEY_FILE: "/run/secrets/modal_mcp_signing_key"
      MODAL_TOKEN_ID_FILE: "/run/secrets/modal_token_id"
      MODAL_TOKEN_SECRET_FILE: "/run/secrets/modal_token_secret"
      MODAL_MCP_AUDIT_LOG: "stdout"
      MODAL_MCP_CLI_FALLBACK: "false"
      MODAL_MCP_DEBUG: "false"
      MODAL_MCP_DEBUG_EXPOSE_IDS: "false"
    secrets:
      - modal_mcp_signing_key
      - modal_token_id
      - modal_token_secret

secrets:
  modal_mcp_signing_key:
    file: ./.secrets/modal-mcp-signing-key
  modal_token_id:
    file: ./.secrets/modal-token-id
  modal_token_secret:
    file: ./.secrets/modal-token-secret
