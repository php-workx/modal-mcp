name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  SYFT_VERSION: "1.42.4"

jobs:
  publish:
    name: Build, sign, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen --extra dev

      - name: Build Python distributions
        run: uv build

      - name: Prepare release artifact directory
        run: |
          mkdir -p release-artifacts
          cp dist/* release-artifacts/

      - name: Install Syft
        run: |
          curl -sSfL -o "syft_${SYFT_VERSION}_linux_amd64.tar.gz" "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          curl -sSfL -o checksums.txt "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_checksums.txt"
          grep " syft_${SYFT_VERSION}_linux_amd64.tar.gz$" checksums.txt | sha256sum -c -
          tar -xzf "syft_${SYFT_VERSION}_linux_amd64.tar.gz" syft
          install -m 0755 syft /usr/local/bin/syft

      - name: Generate SBOM with Syft
        run: syft packages . -o spdx-json=release-artifacts/modal-mcp.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts
        run: |
          for artifact in release-artifacts/*; do
            cosign sign-blob --yes --bundle "release-artifacts/$(basename "$artifact").bundle" "$artifact"
          done

      - name: Generate checksums
        run: |
          cd release-artifacts
          sha256sum -- * > checksums.txt
          cd ..
          echo "Generated checksums:"
          cat release-artifacts/checksums.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modal-mcp-release-artifacts
          path: release-artifacts/

      - name: Attach artifacts to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          for f in release-artifacts/*; do
            gh release upload "$TAG" "$f" --repo ${{ github.repository }} --clobber
          done

      - name: Log in to GHCR
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish GHCR image
        if: github.event_name == 'release'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Publish to PyPI
        if: github.event_name == 'release'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
