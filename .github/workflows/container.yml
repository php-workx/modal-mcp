name: Container

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  security-events: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  image:
    name: Build and scan image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify pinned Python base digest
        run: grep -Eq '^FROM python:3\.12-slim@sha256:[0-9a-f]{64} AS runtime$' Dockerfile

      - name: Build Docker image
        run: docker build --pull -t "$IMAGE_NAME:${{ github.sha }}" .

      - name: Validate Docker Compose file
        run: docker compose config

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          scanners: vuln
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker tag "$IMAGE_NAME:${{ github.sha }}" "$IMAGE_NAME:${{ github.ref_name }}"
          docker push "$IMAGE_NAME:${{ github.ref_name }}"
