# Install with: just setup
# Run manually: just pre-commit-run

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^docs/specs/mcp-concept-(de|en)\.md$
      - id: end-of-file-fixer
        exclude: ^docs/specs/mcp-concept-(de|en)\.md$
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: just-pre-commit
        name: just pre-commit quality gate
        entry: just pre-commit
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: just-pre-push
        name: just pre-push quality gate
        entry: just pre-push
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
